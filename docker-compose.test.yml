version: '3.8'

# Docker Compose configuration for running integration tests
# Usage: docker compose -f docker-compose.test.yml up --exit-code-from test

services:
  postgres:
    image: postgres:16
    container_name: aegisops-test-postgres
    environment:
      POSTGRES_DB: aegisops_test
      POSTGRES_USER: aegisops
      POSTGRES_PASSWORD: aegisops
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisops -d aegisops_test"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: aegisops-test-redis
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: aegisops-test-api-gateway
    environment:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://aegisops:aegisops@postgres:5432/aegisops_test
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: test-secret-key-change-in-production
      ORCHESTRATOR_ENABLED: "true"
      ORCHESTRATOR_PATH: /app/orchestrator
      ORCHESTRATOR_AUTO_ANALYZE_LOGS: "true"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api-gateway:/app
      - ./services/ai-orchestrator:/app/orchestrator
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  test:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.test
    container_name: aegisops-test-runner
    environment:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://aegisops:aegisops@postgres:5432/aegisops_test
      REDIS_URL: redis://redis:6379/0
      API_GATEWAY_URL: http://api-gateway:8000
      ORCHESTRATOR_ENABLED: "true"
      ORCHESTRATOR_PATH: /app/orchestrator
    depends_on:
      api-gateway:
        condition: service_started
    volumes:
      - ./services/api-gateway:/app
      - ./services/ai-orchestrator:/app/orchestrator
      - ./pytest.ini:/app/pytest.ini
    command: ["pytest", "tests/", "-v", "--tb=short"]