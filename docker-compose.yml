services:
  postgres:
    image: postgres:16
    container_name: aegisops-postgres
    environment:
      POSTGRES_DB: aegisops
      POSTGRES_USER: aegisops
      POSTGRES_PASSWORD: aegisops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisops -d aegisops"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: aegisops-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: aegisops-api-gateway
    env_file:
      - ./services/api-gateway/.env.example
    environment:
      # Override container-to-container connectivity
      DATABASE_URL: postgresql+psycopg://aegisops:aegisops@postgres:5432/aegisops
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api-gateway:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  postgres_data:
